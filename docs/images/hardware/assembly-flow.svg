<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-label="Assembly flow">
  <rect width="1080" height="560" fill="#07100d"/>
  <defs>
    <style>
      text{font-family:Arial,'Hiragino Sans',sans-serif}
      .title{fill:#e8f4ee;font-size:30px;font-weight:800}
      .step{fill:#101c18;stroke:#86f0a8;stroke-width:2;rx:14}
      .num{fill:#e3b45a;font-size:28px;font-weight:900}
      .label{fill:#e8f4ee;font-size:19px;font-weight:800}
      .sub{fill:#9fb0a8;font-size:15px}
      .line{stroke:#86f0a8;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#86f0a8"/>
    </marker>
  </defs>
  <text x="54" y="58" class="title">Assembly flow</text>
  <g transform="translate(70 120)">
    <rect width="250" height="110" class="step"/><text x="24" y="42" class="num">1</text><text x="80" y="42" class="label">Probe pads</text><text x="80" y="74" class="sub">Find A/B/C/GND</text>
  </g>
  <g transform="translate(415 120)">
    <rect width="250" height="110" class="step"/><text x="24" y="42" class="num">2</text><text x="80" y="42" class="label">Breadboard</text><text x="80" y="74" class="sub">Build transistor drivers</text>
  </g>
  <g transform="translate(760 120)">
    <rect width="250" height="110" class="step"/><text x="24" y="42" class="num">3</text><text x="80" y="42" class="label">Keyboard test</text><text x="80" y="74" class="sub">Press A/B/C from PC</text>
  </g>
  <g transform="translate(240 330)">
    <rect width="250" height="110" class="step"/><text x="24" y="42" class="num">4</text><text x="80" y="42" class="label">Print case</text><text x="80" y="74" class="sub">Fit ESP32 and switch</text>
  </g>
  <g transform="translate(590 330)">
    <rect width="250" height="110" class="step"/><text x="24" y="42" class="num">5</text><text x="80" y="42" class="label">Final test</text><text x="80" y="74" class="sub">drain / cycle / game</text>
  </g>
  <path d="M322 175 H410" class="line"/><path d="M667 175 H755" class="line"/><path d="M885 235 C840 310 760 330 842 385" class="line"/><path d="M492 385 H585" class="line"/>
</svg>
