<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-label="RE:AL SHOCK MOD hardware overview">
  <rect width="1080" height="520" fill="#07100d"/>
  <defs>
    <style>
      .box{fill:#101c18;stroke:#86f0a8;stroke-width:2;rx:14}
      .box2{fill:#121a24;stroke:#7aa9d6;stroke-width:2;rx:14}
      .warn{fill:#241812;stroke:#e3b45a;stroke-width:2;rx:14}
      .txt{font-family:Arial,'Hiragino Sans',sans-serif;fill:#e8f4ee;font-size:24px;font-weight:700}
      .sub{font-family:Arial,'Hiragino Sans',sans-serif;fill:#9fb0a8;font-size:16px}
      .line{stroke:#86f0a8;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#86f0a8"/>
    </marker>
  </defs>
  <rect x="48" y="90" width="200" height="120" class="box2"/>
  <text x="148" y="145" text-anchor="middle" class="txt">PC MOD</text>
  <text x="148" y="176" text-anchor="middle" class="sub">RE9 + H6 monitor</text>
  <rect x="330" y="90" width="220" height="120" class="box"/>
  <text x="440" y="142" text-anchor="middle" class="txt">ESP32</text>
  <text x="440" y="174" text-anchor="middle" class="sub">BLE / USB Serial</text>
  <rect x="640" y="70" width="190" height="160" class="warn"/>
  <text x="735" y="132" text-anchor="middle" class="txt">A / B / C</text>
  <text x="735" y="164" text-anchor="middle" class="sub">button actuator</text>
  <rect x="890" y="90" width="150" height="120" class="box2"/>
  <text x="965" y="145" text-anchor="middle" class="txt">Device</text>
  <text x="965" y="176" text-anchor="middle" class="sub">external buttons</text>
  <path d="M250 150 H326" class="line"/>
  <path d="M552 150 H636" class="line"/>
  <path d="M832 150 H886" class="line"/>
  <rect x="330" y="310" width="220" height="94" class="box"/>
  <text x="440" y="352" text-anchor="middle" class="txt">GPIO27</text>
  <text x="440" y="382" text-anchor="middle" class="sub">emergency drain switch</text>
  <path d="M440 310 V222" class="line"/>
  <text x="540" y="474" text-anchor="middle" class="sub">One event command becomes reliable physical button presses.</text>
</svg>
