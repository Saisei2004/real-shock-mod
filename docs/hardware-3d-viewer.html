<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RE:AL SHOCK MOD 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111318;
        --panel: #1b1f27;
        --text: #f3f5f8;
        --muted: #9fa8b7;
        --accent: #f05a3d;
        --line: #303846;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(420px, 1.4fr);
      }

      aside {
        padding: 40px;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.7;
      }

      dl {
        display: grid;
        gap: 14px;
        margin: 32px 0 0;
      }

      dt {
        color: var(--muted);
        font-size: 13px;
      }

      dd {
        margin: 4px 0 0;
        font-size: 18px;
      }

      a {
        color: var(--accent);
      }

      .viewer {
        min-height: 100vh;
        position: relative;
      }

      model-viewer {
        width: 100%;
        height: 100vh;
        background: radial-gradient(circle at 60% 40%, #2b3442 0, #161a21 56%, #101216 100%);
      }

      .caption {
        position: absolute;
        left: 24px;
        bottom: 24px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: rgba(17, 19, 24, 0.78);
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          padding: 24px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        model-viewer {
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>ESP32ケース概念モデル</h1>
        <p>
          RE:AL SHOCK MOD の外部デバイス側を説明するための3Dモデルです。
          ESP32、USB口、配線逃げ、緊急ドレインタクトの位置関係を確認できます。
        </p>
        <dl>
          <div>
            <dt>Model</dt>
            <dd><a href="models/real-shock-esp32-case-concept.glb">real-shock-esp32-case-concept.glb</a></dd>
          </div>
          <div>
            <dt>Controls</dt>
            <dd>ドラッグで回転 / スクロールでズーム</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd>実機採寸前の説明用モデル</dd>
          </div>
        </dl>
      </aside>
      <section class="viewer" aria-label="3D viewer">
        <model-viewer
          src="models/real-shock-esp32-case-concept.glb"
          alt="ESP32 enclosure concept model"
          camera-controls
          auto-rotate
          shadow-intensity="0.7"
          exposure="0.92"
          camera-orbit="38deg 64deg 210m"
          field-of-view="30deg"
          interaction-prompt="none">
        </model-viewer>
        <div class="caption">外部デバイス用ケースの概念モデル</div>
      </section>
    </main>
  </body>
</html>
